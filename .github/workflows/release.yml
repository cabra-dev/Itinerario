name: Build e Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instala dependências Node
        run: npm install
        working-directory: comunidade-vendas

      - name: Instala dependências Python
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
        working-directory: comunidade-vendas/backend

      - name: Compila backend
        run: |
          python -m PyInstaller --onefile --hidden-import dotenv --hidden-import prisma --add-data "schema.prisma;prisma" main.py
        working-directory: comunidade-vendas/backend

      - name: Busca binário do Prisma
        run: |
          python -m prisma py fetch
          $cache = "$env:USERPROFILE\.cache\prisma-python\binaries"
          Write-Host "Cache path: $cache"
          if (Test-Path $cache) {
            Get-ChildItem $cache -Recurse | ForEach-Object { Write-Host $_.FullName }
          } else {
            Write-Host "Cache nao existe em $cache"
            # Tenta outro caminho
            $cache2 = "$env:LOCALAPPDATA\prisma-python\binaries"
            Write-Host "Tentando: $cache2"
            Get-ChildItem $cache2 -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
          }
          $prismaPath = Get-ChildItem "$env:USERPROFILE" -Recurse -Filter "query-engine-windows.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Encontrado em: $prismaPath"
          if ($prismaPath) {
            Copy-Item $prismaPath "comunidade-vendas\backend\dist\query-engine-windows.exe"
          } else {
            Write-Error "Binario nao encontrado!"
            exit 1
          }
        shell: powershell

      - name: Cria .env
        run: |
          echo DATABASE_URL="${{ secrets.DATABASE_URL }}" > .env
          echo VITE_API_URL=http://localhost:8000 >> .env
        working-directory: comunidade-vendas

      - name: Build frontend
        run: npm run build
        working-directory: comunidade-vendas

      - name: Gera instalador
        run: npm run dist-app
        working-directory: comunidade-vendas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publica Release
        uses: softprops/action-gh-release@v2
        with:
          files: comunidade-vendas/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}