name: Build e Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instala dependencias Node
        run: npm install
        working-directory: comunidade-vendas

      - name: Instala dependencias Python
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
        working-directory: comunidade-vendas/backend

      - name: Compila backend
        run: |
          python -m PyInstaller --onefile --collect-all prisma --hidden-import dotenv --add-data "schema.prisma;prisma" main.py
        working-directory: comunidade-vendas/backend
        
      - name: Copia binario do Prisma
        run: |
          Copy-Item "comunidade-vendas\prisma-engines\query-engine-windows.exe" "comunidade-vendas\backend\dist\query-engine-windows.exe"
          Write-Host "Binario copiado com sucesso!"
        shell: powershell

      - name: Cria .env
        run: |
          echo DATABASE_URL="${{ secrets.DATABASE_URL }}" > .env
          echo VITE_API_URL=http://localhost:8000 >> .env
        working-directory: comunidade-vendas

      - name: Build frontend
        run: npm run build
        working-directory: comunidade-vendas

      - name: Gera instalador
        run: npm run dist-app
        working-directory: comunidade-vendas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH: never

      - name: Publica Release
        uses: softprops/action-gh-release@v2
        with:
          files: comunidade-vendas/dist/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
